<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diabetes Risk Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6fb; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; }
    .container { background: #fff; border-radius: 16px; box-shadow: 0 4px 32px rgba(0,0,0,0.08); padding: 36px 40px; width: 100%; max-width: 680px; }
    .header { margin-bottom: 28px; }
    .header h1 { font-size: 24px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #6b7280; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: #6b7280; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    .field input { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 15px; color: #1a1a2e; outline: none; transition: border-color 0.2s; background: #fafafa; }
    .field input:focus { border-color: #4f46e5; background: #fff; }
    .submit-btn { width: 100%; padding: 13px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .submit-btn:hover { background: #4338ca; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .result { margin-top: 28px; border-radius: 12px; overflow: hidden; border: 1.5px solid #e5e7eb; display: none; }
    .result-header { padding: 20px 24px 16px; display: flex; align-items: center; gap: 14px; }
    .result-header.high { background: #fff1f0; border-bottom: 1.5px solid #ffd6d6; }
    .result-header.low  { background: #f0fdf4; border-bottom: 1.5px solid #bbf7d0; }
    .result-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .result-icon.high { background: #fee2e2; }
    .result-icon.low  { background: #dcfce7; }
    .result-title { font-size: 20px; font-weight: 700; }
    .result-title.high { color: #b91c1c; }
    .result-title.low  { color: #15803d; }
    .result-subtitle { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .result-body { padding: 20px 24px; }
    .prob-label { display: flex; justify-content: space-between; font-size: 13px; color: #6b7280; margin-bottom: 8px; }
    .prob-label span:last-child { font-weight: 600; color: #1a1a2e; }
    .prob-bar { height: 10px; border-radius: 6px; background: #f3f4f6; overflow: hidden; margin-bottom: 20px; }
    .prob-fill { height: 100%; border-radius: 6px; width: 0%; transition: width 1s ease; }
    .prob-fill.high { background: linear-gradient(90deg, #f87171, #dc2626); }
    .prob-fill.low  { background: linear-gradient(90deg, #4ade80, #16a34a); }
    .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .info-card { background: #f9fafb; border-radius: 8px; padding: 10px 12px; border: 1px solid #f3f4f6; }
    .info-card .label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .info-card .value { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .disclaimer { margin-top: 16px; padding: 12px 16px; background: #fffbeb; border-radius: 8px; border: 1px solid #fde68a; font-size: 12px; color: #92400e; line-height: 1.6; }
    .loading { text-align: center; padding: 24px; color: #6b7280; font-size: 14px; }
    .dot { display: inline-block; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } .info-grid { grid-template-columns: repeat(2, 1fr); } .container { padding: 24px 20px; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🩺 Diabetes Risk Predictor</h1>
    <p>Enter patient details below to get a prediction from the trained ML model.</p>
  </div>
  <div class="grid">
    <div class="field"><label>Pregnancies</label><input type="number" id="pregnancies" min="0" max="20" placeholder="e.g. 2" /></div>
    <div class="field"><label>Glucose (mg/dL)</label><input type="number" id="glucose" min="0" max="300" placeholder="e.g. 120" /></div>
    <div class="field"><label>Blood Pressure (mmHg)</label><input type="number" id="bp" min="0" max="200" placeholder="e.g. 80" /></div>
    <div class="field"><label>Skin Thickness (mm)</label><input type="number" id="skin" min="0" max="100" placeholder="e.g. 20" /></div>
    <div class="field"><label>Insulin (µU/mL)</label><input type="number" id="insulin" min="0" max="1000" placeholder="e.g. 85" /></div>
    <div class="field"><label>BMI</label><input type="number" id="bmi" step="0.1" min="0" max="70" placeholder="e.g. 28.5" /></div>
    <div class="field"><label>Diabetes Pedigree Function</label><input type="number" id="dpf" step="0.001" min="0" max="3" placeholder="e.g. 0.627" /></div>
    <div class="field"><label>Age (years)</label><input type="number" id="age" min="1" max="120" placeholder="e.g. 35" /></div>
  </div>
  <button class="submit-btn" id="predictBtn" onclick="runPrediction()">Predict Diabetes Risk</button>
  <div class="result" id="result"></div>
</div>
<script>
  const API_URL = "http://127.0.0.1:8000/predict";
  async function runPrediction() {
    const ids = ['pregnancies','glucose','bp','skin','insulin','bmi','dpf','age'];
    const vals = {};
    for (const id of ids) {
      const v = parseFloat(document.getElementById(id).value);
      if (isNaN(v)) { alert('Please fill in all fields before predicting.'); return; }
      vals[id] = v;
    }
    const btn = document.getElementById('predictBtn');
    const resultDiv = document.getElementById('result');
    btn.disabled = true;
    btn.textContent = 'Analyzing...';
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = '<div class="loading">Running your model <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>';
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          pregnancies: vals.pregnancies, glucose: vals.glucose, blood_pressure: vals.bp,
          skin_thickness: vals.skin, insulin: vals.insulin, bmi: vals.bmi,
          diabetes_pedigree_function: vals.dpf, age: vals.age
        })
      });
      if (!res.ok) throw new Error('Server error: ' + res.status);
      const data = await res.json();
      const prob = Math.min(100, Math.max(0, data.probability));
      const isHigh = data.risk_level === 'High';
      const cls = isHigh ? 'high' : 'low';
      const icon = isHigh ? '⚠️' : '✅';
      const fields = [
        {label:'Pregnancies', val: vals.pregnancies},
        {label:'Glucose', val: vals.glucose + ' mg/dL'},
        {label:'Blood Pressure', val: vals.bp + ' mmHg'},
        {label:'Skin Thickness', val: vals.skin + ' mm'},
        {label:'Insulin', val: vals.insulin + ' µU/mL'},
        {label:'BMI', val: vals.bmi},
        {label:'Pedigree Fn.', val: vals.dpf},
        {label:'Age', val: vals.age + ' yrs'},
      ];
      const infoHTML = fields.map(f => '<div class="info-card"><div class="label">'+f.label+'</div><div class="value">'+f.val+'</div></div>').join('');
      resultDiv.innerHTML = '<div class="result-header '+cls+'"><div class="result-icon '+cls+'">'+icon+'</div><div><div class="result-title '+cls+'">'+data.result+'</div><div class="result-subtitle">'+data.risk_level+' risk · SVM model prediction</div></div></div><div class="result-body"><div class="prob-label"><span>Prediction confidence</span><span>'+prob+'%</span></div><div class="prob-bar"><div class="prob-fill '+cls+'" id="probFill"></div></div><div class="info-grid">'+infoHTML+'</div><div class="disclaimer">⚠️ This tool is for educational purposes only and is not a substitute for professional medical advice. Always consult a qualified healthcare provider for diagnosis and treatment.</div></div>';
      setTimeout(() => { const fill = document.getElementById('probFill'); if (fill) fill.style.width = prob + '%'; }, 50);
    } catch(e) {
      resultDiv.innerHTML = '<div style="padding:20px 24px;color:#b91c1c;font-size:14px;background:#fff1f0;"><strong>Could not connect to the API.</strong><br>Make sure your FastAPI server is running:<br><code style="background:#fee2e2;padding:4px 8px;border-radius:4px;margin-top:8px;display:inline-block;">python -m uvicorn main:app --reload</code></div>';
    }
    btn.disabled = false;
    btn.textContent = 'Predict Diabetes Risk';
  }
</script>
</body>
</html>
